<aside class="sidebar" [class.collapsed]="isCollapsed">
  <!-- Brand / Project Selector -->
  <div class="sidebar-brand" (click)="selectProject()" title="Change Project">
    <img
      src="assets/icon.svg"
      alt="Ensemble"
      class="brand-icon"
      width="32"
      height="32"
    />
    <span class="brand-text" *ngIf="!isCollapsed">Ensemble</span>
  </div>

  <!-- Navigation Sections -->
  <nav class="sidebar-nav">
    <ng-container *ngFor="let section of sections; let isLast = last">
      <div class="nav-section">
        <!-- Section Header -->
        <div class="section-header" [class.collapsed]="isCollapsed">
          <span class="section-label" *ngIf="!isCollapsed">{{ section.label }}</span>
          <span class="section-divider" *ngIf="isCollapsed"></span>
        </div>

        <!-- Section Items -->
        <div class="section-items">
          <button
            *ngFor="let item of section.items"
            class="nav-item"
            [class.active]="isActive(item.route)"
            (click)="navigateTo(item.route)"
            [title]="isCollapsed ? item.title : ''"
          >
            <svg class="nav-icon" [attr.data-icon]="item.icon">
              <use [attr.href]="'#icon-' + item.icon"></use>
            </svg>
            <span class="nav-label" *ngIf="!isCollapsed">{{ item.label }}</span>
          </button>
        </div>
      </div>
    </ng-container>
  </nav>

  <!-- Collapse Toggle -->
  <button class="collapse-toggle" (click)="toggleCollapse()" [title]="isCollapsed ? 'Expand sidebar' : 'Collapse sidebar'">
    <svg class="toggle-icon" [class.rotated]="!isCollapsed">
      <use href="#icon-chevrons-right"></use>
    </svg>
  </button>

  <!-- SVG Icon Definitions -->
  <svg style="display: none;">
    <defs>
      <!-- Users icon -->
      <symbol id="icon-users" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </symbol>

      <!-- Git Branch / Relationships -->
      <symbol id="icon-git-branch" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="6" y1="3" x2="6" y2="15"/>
        <circle cx="18" cy="6" r="3"/>
        <circle cx="6" cy="18" r="3"/>
        <path d="M18 9a9 9 0 0 1-9 9"/>
      </symbol>

      <!-- Theater / Casts -->
      <symbol id="icon-theater" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 10s3-3 10-3 10 3 10 3"/>
        <path d="M2 10v8c0 2 3 4 10 4s10-2 10-4v-8"/>
        <circle cx="8" cy="14" r="2"/>
        <circle cx="16" cy="14" r="2"/>
      </symbol>

      <!-- Book -->
      <symbol id="icon-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </symbol>

      <!-- Layout / Backstage -->
      <symbol id="icon-layout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="9" y1="21" x2="9" y2="9"/>
      </symbol>

      <!-- CPU / AI -->
      <symbol id="icon-cpu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
        <rect x="9" y="9" width="6" height="6"/>
        <line x1="9" y1="1" x2="9" y2="4"/>
        <line x1="15" y1="1" x2="15" y2="4"/>
        <line x1="9" y1="20" x2="9" y2="23"/>
        <line x1="15" y1="20" x2="15" y2="23"/>
        <line x1="20" y1="9" x2="23" y2="9"/>
        <line x1="20" y1="14" x2="23" y2="14"/>
        <line x1="1" y1="9" x2="4" y2="9"/>
        <line x1="1" y1="14" x2="4" y2="14"/>
      </symbol>

      <!-- Settings -->
      <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </symbol>

      <!-- Chevrons Right -->
      <symbol id="icon-chevrons-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="13 17 18 12 13 7"/>
        <polyline points="6 17 11 12 6 7"/>
      </symbol>
    </defs>
  </svg>
</aside>
