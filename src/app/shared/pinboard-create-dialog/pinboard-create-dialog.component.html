<div class="modal-overlay" *ngIf="visible" (click)="onOverlayClick()">
  <div class="modal-dialog" (click)="onDialogClick($event)">
    <div class="modal-header">
      <h3>Create Pinboard</h3>
      <button class="close-btn" (click)="onClose()">&times;</button>
    </div>
    <div class="modal-body">
      <form (ngSubmit)="onCreate()">
        <div class="form-group">
          <label for="pinboardName">Pinboard Name:</label>
          <input
            type="text"
            id="pinboardName"
            [(ngModel)]="pinboardName"
            name="pinboardName"
            placeholder="Enter pinboard name..."
            autofocus
            required
            maxlength="50"
          />
        </div>

        <div class="form-group" *ngIf="pinboards.length > 0">
          <label for="duplicateFrom">Duplicate from (optional):</label>
          <select
            id="duplicateFrom"
            [(ngModel)]="duplicateFromId"
            name="duplicateFrom"
          >
            <option [value]="null">Create empty pinboard</option>
            <option *ngFor="let pinboard of pinboards" [value]="pinboard.id">
              {{ pinboard.name }}
            </option>
          </select>
        </div>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" (click)="onClose()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create</button>
        </div>
      </form>
    </div>
  </div>
</div>
