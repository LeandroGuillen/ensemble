<div class="pinboard-sidebar">
  <div class="sidebar-header">
    <h3>Pinboards</h3>
    <button class="create-btn" (click)="onCreatePinboard()" title="Create new pinboard">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 3V13M3 8H13" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
    </button>
  </div>

  <div class="pinboard-list">
    <div
      *ngFor="let pinboard of pinboards"
      class="pinboard-item"
      [class.active]="isCurrentPinboard(pinboard.id)"
      (click)="onPinboardSelect(pinboard.id)"
      (contextmenu)="onContextMenu($event, pinboard.id)"
    >
      <span class="pinboard-name">{{ pinboard.name }}</span>
      <span class="pinboard-count" *ngIf="pinboard.nodes.length > 0">
        {{ pinboard.nodes.length }}
      </span>
    </div>

    <div *ngIf="pinboards.length === 0" class="empty-state">
      <p>No pinboards yet</p>
      <button class="create-link" (click)="onCreatePinboard()">Create one</button>
    </div>
  </div>

  <!-- Context Menu -->
  <div
    *ngIf="contextMenuPinboardId && contextMenuPosition"
    class="context-menu"
    [style.left.px]="contextMenuPosition.x"
    [style.top.px]="contextMenuPosition.y"
    (click)="$event.stopPropagation()"
  >
    <button
      class="context-menu-item"
      (click)="onRenamePinboard(contextMenuPinboardId)"
    >
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11.333 2.667a2.828 2.828 0 1 1 4 4L6 14.667H2.667V11.333L11.333 2.667z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Rename
    </button>
    <button
      class="context-menu-item danger"
      (click)="onDeletePinboard(contextMenuPinboardId)"
    >
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 4h12M5.333 4V2.667a1.333 1.333 0 0 1 1.334-1.334h2.666a1.333 1.333 0 0 1 1.334 1.334V4m2 0v9.333a1.333 1.333 0 0 1-1.334 1.334H4.667a1.333 1.333 0 0 1-1.334-1.334V4h9.334z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Delete
    </button>
  </div>
</div>

<!-- Backdrop to close context menu -->
<div
  *ngIf="contextMenuPinboardId"
  class="context-menu-backdrop"
  (click)="closeContextMenu()"
></div>
