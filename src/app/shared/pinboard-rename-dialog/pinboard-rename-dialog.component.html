<div class="modal-overlay" *ngIf="visible" (click)="onOverlayClick()">
  <div class="modal-dialog" (click)="onDialogClick($event)">
    <div class="modal-header">
      <h3>Rename Pinboard</h3>
      <button class="close-btn" (click)="onClose()">&times;</button>
    </div>
    <div class="modal-body">
      <form (ngSubmit)="onRename()">
        <div class="form-group">
          <label for="pinboardName">Pinboard Name:</label>
          <input
            type="text"
            id="pinboardName"
            [(ngModel)]="pinboardName"
            name="pinboardName"
            placeholder="Enter pinboard name..."
            autofocus
            required
            maxlength="50"
          />
        </div>

        <div class="error-message" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" (click)="onClose()">Cancel</button>
          <button type="submit" class="btn btn-primary">Rename</button>
        </div>
      </form>
    </div>
  </div>
</div>
