<header class="page-header">
  <div class="header-left">
    <ng-content select="[pageHeaderPrefix]"></ng-content>
    <h1 class="page-title">{{ title }}</h1>
  </div>

  <div class="header-center" *ngIf="showSearch">
    <button
      class="command-palette-btn"
      (click)="openCommandPalette()"
      title="Command Palette (Ctrl+P or /)"
    >
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="11" cy="11" r="8"></circle>
        <path d="M21 21l-4.35-4.35"></path>
      </svg>
      <span class="command-palette-label">Search</span>
      <kbd class="shortcut-hint">Ctrl+P</kbd>
      <kbd class="shortcut-hint">/</kbd>
    </button>
  </div>

  <div class="header-right">
    <ng-content></ng-content>
  </div>
</header>
