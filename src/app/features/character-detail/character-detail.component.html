<div class="container">
  <div class="character-detail">
    <div class="detail-header">
      <h2>{{ isEditing ? 'Edit Character' : 'Create New Character' }}</h2>
      <button class="btn btn-secondary" (click)="onCancel()">
        Back to List
      </button>
    </div>

    <div class="character-form card">
      <form [formGroup]="characterForm" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="name">Name *</label>
            <input 
              type="text" 
              id="name"
              class="form-control" 
              formControlName="name"
              placeholder="Character name">
            <div class="error-text" *ngIf="characterForm.get('name')?.invalid && characterForm.get('name')?.touched">
              Name is required
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="category">Category *</label>
            <select 
              id="category"
              class="form-control" 
              formControlName="category">
              <option value="">Select a category</option>
              <option *ngFor="let category of categories" [value]="category.id">
                {{ category.name }}
              </option>
            </select>
            <div class="error-text" *ngIf="characterForm.get('category')?.invalid && characterForm.get('category')?.touched">
              Category is required
            </div>
          </div>
        </div>

        <div class="form-group" *ngIf="tags.length > 0">
          <label class="form-label">Tags</label>
          <div class="tag-selection">
            <label *ngFor="let tag of tags" class="tag-checkbox">
              <input 
                type="checkbox" 
                [checked]="isTagSelected(tag.id)"
                (change)="onTagChange(tag.id, $any($event.target).checked)">
              <span class="tag-name">{{ tag.name }}</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Thumbnail</label>
          <div class="thumbnail-section">
            <div class="thumbnail-preview" *ngIf="characterForm.get('thumbnail')?.value">
              <img [src]="characterForm.get('thumbnail')?.value" alt="Character thumbnail">
            </div>
            <button type="button" class="btn btn-secondary" (click)="selectThumbnail()">
              {{ characterForm.get('thumbnail')?.value ? 'Change Thumbnail' : 'Select Thumbnail' }}
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="description">Description</label>
          <textarea 
            id="description"
            class="form-control" 
            formControlName="description"
            rows="4"
            placeholder="Physical description and appearance..."></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="notes">Notes</label>
          <textarea 
            id="notes"
            class="form-control" 
            formControlName="notes"
            rows="6"
            placeholder="Character development notes, personality traits, backstory..."></textarea>
        </div>

        <div class="form-actions">
          <button 
            type="button" 
            class="btn btn-secondary" 
            (click)="onCancel()">
            Cancel
          </button>
          <button 
            type="submit" 
            class="btn btn-primary"
            [disabled]="characterForm.invalid || isLoading">
            {{ isLoading ? 'Saving...' : (isEditing ? 'Update Character' : 'Create Character') }}
          </button>
        </div>

        <div class="error-message" *ngIf="error">
          {{ error }}
        </div>
      </form>
    </div>
  </div>
</div>
