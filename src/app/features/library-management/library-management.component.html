<div class="library-management">
  <app-page-header [title]="'Library'" [showSearch]="false">
    <div class="page-actions">
      <button
        class="btn btn-primary add-book-btn"
        (click)="showAddBookForm()"
        [disabled]="saving"
      >
        <span class="icon">📚</span>
        Add Book
      </button>
    </div>
  </app-page-header>

  <div class="library-content">
    <div class="library-inner">
      <!-- Loading State -->
      <div *ngIf="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading library...</p>
      </div>

      <!-- Error Display -->
      <div *ngIf="error" class="error-banner">
        <div class="error-content">
          <span class="error-icon">⚠️</span>
          <span class="error-message">{{ error }}</span>
          <button class="error-close" (click)="error = null">×</button>
        </div>
      </div>

      <!-- Main Content -->
      <div *ngIf="!loading" class="content">
        <!-- Books Section -->
        <section class="section books-section">
          <!-- Books Library Display -->
          <div class="books-library">
            <div
              class="bookshelf"
              (dragover)="onGlobalDragOver($event)"
              (drop)="onGlobalDrop($event)"
            >
              <!-- Book Items with Smart Drop Zones -->
              <ng-container *ngFor="let book of books; let i = index">
                <div
                  class="book-slot"
                  [class.drag-over-left]="
                    dragOverIndex === i &&
                    dragOverSide === 'left' &&
                    draggedIndex !== null
                  "
                  [class.drag-over-right]="
                    dragOverIndex === i &&
                    dragOverSide === 'right' &&
                    draggedIndex !== null
                  "
                >
                  <!-- Left drop zone (covers left half of book area) -->
                  <div
                    class="drop-zone-left"
                    (dragover)="onDragOver($event, i, 'left')"
                    (dragenter)="onDragEnter($event, i, 'left')"
                    (dragleave)="onDragLeave($event)"
                    (drop)="onDrop($event, i)"
                  ></div>

                  <!-- Right drop zone (covers right half of book area) -->
                  <div
                    class="drop-zone-right"
                    (dragover)="onDragOver($event, i, 'right')"
                    (dragenter)="onDragEnter($event, i, 'right')"
                    (dragleave)="onDragLeave($event)"
                    (drop)="onDrop($event, i + 1)"
                  ></div>

                  <!-- Book Item -->
                  <app-book-item
                    [book]="book"
                    [isSelected]="selectedBook?.id === book.id"
                    [isDragging]="draggedIndex === i"
                    [dragIndex]="i"
                    (bookClick)="onBookClick($event)"
                    (bookEdit)="onBookEdit($event)"
                    (bookDelete)="onBookDelete($event)"
                    (dragStart)="onDragStart($event, i)"
                    (dragEndEvent)="onDragEnd()"
                  >
                  </app-book-item>
                </div>
              </ng-container>

              <!-- Empty state -->
              <div *ngIf="books.length === 0" class="empty-bookshelf">
                <div class="empty-book-placeholder">
                  <div class="placeholder-icon">📖</div>
                  <p>Your library is empty</p>
                  <p class="empty-subtitle">
                    Add your first book to get started
                  </p>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <!-- Book Editor Modal -->
  <app-book-editor
    [book]="editingBook"
    [isVisible]="showBookForm"
    [saving]="saving"
    (save)="onEditorSave($event)"
    (cancel)="onEditorCancel()"
    (delete)="onEditorDelete($event)"
  >
  </app-book-editor>
</div>
