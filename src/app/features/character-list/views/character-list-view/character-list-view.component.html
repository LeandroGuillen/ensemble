<div class="character-list-view" [class.single-column]="columns === 1" [class.two-columns]="columns === 2">
  <div
    *ngFor="let character of characters; let i = index"
    class="character-list-item character-item"
    [class.selected]="selectedCharacterIndex === i"
    [class.multi-selected]="isCharacterSelected(character.id)"
    [attr.data-index]="i"
    (click)="onCharacterClick(character)"
    role="button"
    tabindex="0"
    (keydown.enter)="onCharacterClick(character)"
    (keydown.space)="onCharacterClick(character); $event.preventDefault()"
  >
    <div class="list-item-thumbnail">
      <img
        *ngIf="getCharacterThumbnailDataUrl(character)"
        [src]="getCharacterThumbnailDataUrl(character)"
        [alt]="character.name"
        (error)="onImageError($event)"
      />
      <div *ngIf="!getCharacterThumbnailDataUrl(character)" class="thumbnail-placeholder-small" [style.background-color]="getPlaceholderColor(character)">
        <svg viewBox="0 0 24 24" fill="currentColor" class="placeholder-icon">
          <circle cx="12" cy="8" r="4.5"/>
          <path d="M12 14c-5 0-9 2.5-9 5.5V22h18v-2.5c0-3-4-5.5-9-5.5z"/>
        </svg>
      </div>
    </div>

    <div class="list-item-content">
      <div class="list-item-header">
        <h3 class="list-item-name">{{ character.name }}</h3>
        <span class="list-item-category" [style.color]="getCategoryColor(character.category)">
          {{ getCategoryName(character.category) }}
        </span>
      </div>

      <div class="list-item-tags" *ngIf="character.tags.length > 0">
        <span
          *ngFor="let tag of getCharacterTagsInOrder(character)"
          class="tag tag-sm"
          [style.background-color]="tag.color"
          [style.color]="'white'"
        >
          {{ tag.name }}
        </span>
      </div>

      <p class="list-item-description" *ngIf="character.content">
        {{
          character.content.length > 150
            ? character.content.substring(0, 150) + '...'
            : character.content
        }}
      </p>
    </div>

    <div class="list-item-actions">
      <button class="icon-btn" (click)="onCharacterClickWithStop(character, $event)" title="Edit character" aria-label="Edit character">
        ✏️
      </button>
      <button class="icon-btn delete-btn" (click)="onCharacterDelete(character, $event)" title="Delete character" aria-label="Delete character">
        🗑️
      </button>
    </div>
  </div>
</div>
