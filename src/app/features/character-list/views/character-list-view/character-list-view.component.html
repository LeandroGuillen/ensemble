<div class="character-list-view" [class.single-column]="columns === 1" [class.two-columns]="columns === 2">
  <div
    *ngFor="let character of characters; let i = index"
    class="character-list-item character-item"
    [class.selected]="selectedCharacterIndex === i"
    [class.multi-selected]="isCharacterSelected(character.id)"
    [attr.data-index]="i"
    (click)="onCharacterClick(character)"
  >
    <input
      type="checkbox"
      class="character-checkbox"
      [checked]="isCharacterSelected(character.id)"
      (click)="$event.stopPropagation()"
      (change)="onCharacterSelectionToggle(character.id)"
    />
    <div class="list-item-thumbnail">
      <img
        *ngIf="getCharacterThumbnailDataUrl(character)"
        [src]="getCharacterThumbnailDataUrl(character)"
        [alt]="character.name"
        (error)="onImageError($event)"
      />
      <div *ngIf="!getCharacterThumbnailDataUrl(character)" class="thumbnail-placeholder-small">👤</div>
    </div>

    <div class="list-item-content">
      <div class="list-item-header">
        <h3 class="list-item-name">{{ character.name }}</h3>
        <span class="list-item-category" [style.color]="getCategoryColor(character.category)">
          {{ getCategoryName(character.category) }}
        </span>
      </div>

      <div class="list-item-tags" *ngIf="character.tags.length > 0">
        <span
          *ngFor="let tag of getCharacterTagsInOrder(character)"
          class="tag tag-sm"
          [style.background-color]="tag.color"
          [style.color]="'white'"
        >
          {{ tag.name }}
        </span>
      </div>

      <p class="list-item-description" *ngIf="character.description">
        {{
          character.description.length > 150
            ? character.description.substring(0, 150) + '...'
            : character.description
        }}
      </p>
    </div>

    <div class="list-item-actions">
      <button class="icon-btn" (click)="onCharacterClickWithStop(character, $event)" title="Edit character">
        ✏️
      </button>
      <button class="icon-btn delete-btn" (click)="onCharacterDelete(character, $event)" title="Delete character">
        🗑️
      </button>
    </div>
  </div>
</div>
