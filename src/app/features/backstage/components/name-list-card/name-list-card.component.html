<div
  class="name-list-card"
  [class.focused]="isFocused"
  [class.dimmed]="isDimmed"
  [class.selected]="isSelected"
  (dblclick)="onFocus()"
  tabindex="0"
>
  <div class="name-list-header">
    <button
      class="icon-btn collapse-btn"
      (click)="toggleCollapse()"
      [title]="isCollapsed ? 'Expand' : 'Collapse'"
      [attr.aria-label]="isCollapsed ? 'Expand name list' : 'Collapse name list'"
      [attr.aria-expanded]="!isCollapsed"
    >
      {{ isCollapsed ? "▶" : "▼" }}
    </button>
    <input
      type="text"
      class="name-list-title"
      [value]="nameList.title"
      (blur)="onTitleChange($any($event.target).value)"
      (keyup.enter)="$any($event.target).blur()"
      placeholder="List Title"
    />
    <span class="name-count" *ngIf="isCollapsed && nameList.names.length > 0">
      ({{ nameList.names.length }})
    </span>
    <button class="icon-btn delete-btn" (click)="onDelete($event)" title="Delete list" aria-label="Delete name list">
      🗑️
    </button>
  </div>

  <div class="name-list-content" *ngIf="!isCollapsed">
    <div class="names-list" *ngIf="nameList.names.length > 0">
      <div
        class="name-item"
        [class.selected]="isNameSelected(i)"
        *ngFor="let nameItem of nameList.names; let i = index"
      >
        <div class="name-main">
          <input
            type="text"
            class="name-input"
            [value]="nameItem.name"
            [attr.data-name-index]="i"
            (blur)="onNameChange(i, $any($event.target).value)"
            (keyup.enter)="$any($event.target).blur()"
            placeholder="Name"
          />
          <div class="name-actions">
            <button
              class="icon-btn-sm"
              (click)="onTakeTheStage(nameItem.name, $event)"
              title="Take the Stage - Create character with this name"
              aria-label="Take the Stage - Create character with this name"
            >
              ⭐
            </button>
            <button
              class="icon-btn-sm notes-toggle"
              *ngIf="hasNotes(i) || true"
              (click)="toggleNotes(i)"
              [title]="isNotesExpanded(i) ? 'Hide notes' : 'Show notes'"
              [attr.aria-label]="isNotesExpanded(i) ? 'Hide notes' : 'Show notes'"
              [attr.aria-expanded]="isNotesExpanded(i)"
            >
              {{ isNotesExpanded(i) ? '▼' : '▶' }}
            </button>
            <button
              class="icon-btn-sm"
              (click)="onRemoveName(i)"
              title="Remove name"
              aria-label="Remove name"
            >
              ×
            </button>
          </div>
        </div>
        <div class="name-notes" *ngIf="isNotesExpanded(i)">
          <textarea
            class="notes-textarea"
            [value]="nameItem.notes || ''"
            (blur)="onNotesChange(i, $any($event.target).value)"
            placeholder="Add notes (sub-bullets)..."
            rows="3"
          ></textarea>
        </div>
      </div>
    </div>

    <div class="empty-names" *ngIf="nameList.names.length === 0">
      <p class="text-muted text-sm">No names yet</p>
    </div>

    <div class="add-name-form">
      <div *ngIf="!bulkAddMode" class="single-add-mode">
        <input
          type="text"
          class="form-control"
          data-new-name-input
          [(ngModel)]="newNameInput"
          (keyup.enter)="onAddName()"
          placeholder="Add a name..."
        />
        <button
          class="btn btn-secondary btn-sm"
          (click)="onAddName()"
          [disabled]="!newNameInput.trim()"
        >
          Add
        </button>
        <button
          class="btn btn-ghost btn-sm"
          (click)="toggleBulkAddMode()"
          title="Bulk add mode"
        >
          Bulk Add
        </button>
      </div>
      <div *ngIf="bulkAddMode" class="bulk-add-mode">
        <textarea
          class="form-control bulk-input"
          [(ngModel)]="bulkInputText"
          placeholder="Paste multiple names (one per line, or comma/semicolon separated)..."
          rows="4"
        ></textarea>
        <div class="bulk-actions">
          <button
            class="btn btn-primary btn-sm"
            (click)="onBulkAdd()"
            [disabled]="!bulkInputText.trim()"
          >
            Add All
          </button>
          <button
            class="btn btn-ghost btn-sm"
            (click)="toggleBulkAddMode()"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
