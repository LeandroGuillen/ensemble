<div class="name-list-card">
  <div class="name-list-header">
    <button
      class="icon-btn collapse-btn"
      (click)="toggleCollapse()"
      [title]="isCollapsed ? 'Expand' : 'Collapse'"
    >
      {{ isCollapsed ? "▶" : "▼" }}
    </button>
    <input
      type="text"
      class="name-list-title"
      [value]="nameList.title"
      (blur)="onTitleChange($any($event.target).value)"
      (keyup.enter)="$any($event.target).blur()"
      placeholder="List Title"
    />
    <span class="name-count" *ngIf="isCollapsed && nameList.names.length > 0">
      ({{ nameList.names.length }})
    </span>
    <button class="icon-btn delete-btn" (click)="onDelete($event)" title="Delete list">
      🗑️
    </button>
  </div>

  <div class="name-list-content" *ngIf="!isCollapsed">
    <div class="names-list" *ngIf="nameList.names.length > 0">
      <div class="name-item" *ngFor="let name of nameList.names; let i = index">
        <input
          type="text"
          class="name-input"
          [value]="name"
          (blur)="onNameChange(i, $any($event.target).value)"
          (keyup.enter)="$any($event.target).blur()"
          placeholder="Name"
        />
        <div class="name-actions">
          <button
            class="icon-btn-sm"
            (click)="onTakeTheStage(name, $event)"
            title="Take the Stage - Create character with this name"
          >
            ⭐
          </button>
          <button
            class="icon-btn-sm"
            (click)="onRemoveName(i)"
            title="Remove name"
          >
            ×
          </button>
        </div>
      </div>
    </div>

    <div class="empty-names" *ngIf="nameList.names.length === 0">
      <p class="text-muted text-sm">No names yet</p>
    </div>

    <div class="add-name-form">
      <input
        type="text"
        class="form-control"
        [(ngModel)]="newNameInput"
        (keyup.enter)="onAddName()"
        placeholder="Add a name..."
      />
      <button
        class="btn btn-secondary btn-sm"
        (click)="onAddName()"
        [disabled]="!newNameInput.trim()"
      >
        Add
      </button>
    </div>
  </div>
</div>
