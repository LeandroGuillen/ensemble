<div class="app-container">
  <nav class="app-nav" *ngIf="hasProject">
    <div class="nav-brand" (click)="selectProject()" style="cursor: pointer;" title="Change Project">
      <span class="brand-icon">✨</span>
      <span class="brand-name">{{ title }}</span>
      <span class="project-name" *ngIf="currentProjectName">{{ currentProjectName }}</span>
    </div>
    <div class="nav-links">
      <button class="nav-link" [class.active]="isActive('/characters')" (click)="navigateToList()" title="Characters">
        👥
      </button>
      <button class="nav-link" [class.active]="isActive('/graph')" (click)="navigateToGraph()" title="Graph View">
        🌐
      </button>
      <button class="nav-link" [class.active]="isActive('/metadata')" (click)="navigateToMetadata()" title="Settings">
        ⚙️
      </button>
    </div>
  </nav>

  <main class="app-main" [class.with-nav]="hasProject">
    <router-outlet></router-outlet>
  </main>
</div>
