<div class="app-container">
  <nav class="app-nav" *ngIf="hasProject && !isWelcomeScreen">
    <div
      class="nav-brand"
      (click)="selectProject()"
      style="cursor: pointer"
      title="Change Project"
    >
      <img
        src="assets/icon.svg"
        alt="Ensemble"
        class="brand-icon"
        width="40"
        height="40"
      />
      <span class="brand-name">{{ title }}</span>
      <span class="project-name" *ngIf="currentProjectName">{{
        currentProjectName
      }}</span>
    </div>
    <div class="nav-center">
      <button
        class="command-palette-btn"
        (click)="openCommandPalette()"
        title="Command Palette (Ctrl+P or /)"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <path d="M21 21l-4.35-4.35"></path>
        </svg>
        <span class="command-palette-label">Search</span>
        <kbd class="shortcut-hint">Ctrl+P</kbd>
        <kbd class="shortcut-hint">/</kbd>
      </button>
    </div>
    <div class="nav-links">
      <button
        class="nav-link"
        [class.active]="isActive('/characters')"
        (click)="navigateToList()"
        title="Characters"
      >
        👥
      </button>
      <button
        class="nav-link"
        [class.active]="isActive('/graph')"
        (click)="navigateToGraph()"
        title="Graph View"
      >
        🌐
      </button>
      <button
        class="nav-link"
        [class.active]="isActive('/metadata')"
        (click)="navigateToMetadata()"
        title="Settings"
      >
        ⚙️
      </button>
    </div>
  </nav>

  <main class="app-main" [class.with-nav]="hasProject">
    <router-outlet></router-outlet>
  </main>

  <app-command-palette></app-command-palette>
</div>
