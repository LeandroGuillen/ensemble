name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Install npm dependencies
        run: npm ci

      - name: Build icons
        run: npm run build-icons

      - name: Build Angular app
        run: npm run build -- --configuration production

      - name: Build AppImage
        run: |
          # Temporarily disable publish to prevent electron-builder from auto-publishing
          # We'll handle publishing manually via GitHub Actions
          npm run build-electron-linux-appimage -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_FOR_CI: true

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $VERSION"

      - name: List release artifacts
        run: |
          echo "Checking for release artifacts..."
          ls -lh release/ || echo "Release directory not found"
          find release -name "*.AppImage" -o -name "*.yml" || echo "No AppImage or YML files found"

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.AppImage
            release/latest-linux.yml
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

